<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="description" content="初手安全保証つきの本格マインスイーパ「マインフィールド」。旗立て・タイマー・3難易度に対応。タッチもキーボードもOK、ベストタイムはブラウザに保存されます。">
<title>マインフィールド — 夜間掃海パズル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e0a;
  --panel:rgba(24,29,20,.82);
  --line:rgba(196,214,150,.14);
  --ink:#e8eddb;
  --dim:#98a284;
  --amber:#ffb454;
  --amber-deep:#e08a1e;
  --moss:#9fce5a;
  --danger:#ff6a5e;
  --tile-a:#2b3324;
  --tile-b:#242b1e;
  --tile-open:#12160e;
}
html{-webkit-text-size-adjust:100%}
body{
  min-height:100svh;
  background:
    radial-gradient(80vmax 60vmax at 85% -15%, rgba(90,110,40,.22), transparent 60%),
    radial-gradient(70vmax 70vmax at -10% 110%, rgba(160,110,30,.14), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
}
body::before{
  content:"";
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg, transparent 0 47px, rgba(196,214,150,.045) 47px 48px),
    repeating-linear-gradient(90deg, transparent 0 47px, rgba(196,214,150,.045) 47px 48px);
  mask-image:radial-gradient(75% 75% at 50% 40%, #000 30%, transparent 100%);
  -webkit-mask-image:radial-gradient(75% 75% at 50% 40%, #000 30%, transparent 100%);
}
#app{
  position:relative;z-index:1;
  width:min(96vw,860px);
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(10px,2.4vh,22px) 0 6px;
  min-height:100svh;
}
header.top{
  width:100%;
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0 4px 8px;
}
.logo{
  font-weight:800;
  font-size:clamp(17px,4.4vw,24px);
  letter-spacing:.14em;
}
.logo .mark{color:var(--amber)}
.logo .sub{
  display:block;font-size:10px;font-weight:600;letter-spacing:.42em;
  color:var(--dim);margin-top:2px;
}
.diff-badge{
  font-size:12px;letter-spacing:.2em;color:var(--dim);
  border:1px solid var(--line);border-radius:999px;padding:4px 12px;
}
.hud{
  width:100%;
  display:flex;align-items:stretch;gap:8px;
  margin-bottom:10px;
}
.hud .box{
  flex:1;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:7px 10px 8px;
  text-align:center;
  backdrop-filter:blur(6px);
}
.hud .label{
  font-size:9px;letter-spacing:.32em;color:var(--dim);font-weight:700;
}
.hud .value{
  font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  font-variant-numeric:tabular-nums;
  font-size:clamp(18px,4.6vw,25px);
  font-weight:700;
  color:var(--amber);
  text-shadow:0 0 14px rgba(255,180,84,.35);
  line-height:1.25;
}
.hud .value.ok{color:var(--moss);text-shadow:0 0 14px rgba(159,206,90,.3)}
.hud button{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  color:var(--ink);
  font-size:19px;
  min-width:52px;
  cursor:pointer;
  touch-action:manipulation;
  transition:transform .12s ease, border-color .2s, background .2s;
}
.hud button:active{transform:scale(.93)}
.hud button.on{
  border-color:var(--amber);
  background:rgba(255,180,84,.16);
  box-shadow:0 0 16px rgba(255,180,84,.25) inset;
}
#stage{
  position:relative;
  border-radius:16px;
}
canvas#board{
  display:block;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--tile-open);
  box-shadow:0 18px 50px rgba(0,0,0,.55), 0 0 0 6px rgba(24,29,20,.55);
  touch-action:none;
  -webkit-touch-callout:none;
  user-select:none;
  -webkit-user-select:none;
}
#stage.shake{animation:shk .38s linear}
@keyframes shk{
  0%,100%{transform:translate(0,0)}
  15%{transform:translate(-7px,3px)}
  30%{transform:translate(6px,-4px)}
  45%{transform:translate(-5px,-3px)}
  60%{transform:translate(4px,4px)}
  75%{transform:translate(-3px,1px)}
  90%{transform:translate(2px,-1px)}
}
#overlay{
  position:absolute;inset:-1px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,10,6,.78);
  backdrop-filter:blur(7px);
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
  overflow-y:auto;
}
#overlay.show{opacity:1;pointer-events:auto}
.panel{
  width:min(88%,420px);
  text-align:center;
  padding:26px 8px;
  animation:rise .45s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes rise{from{transform:translateY(16px) scale(.96);opacity:0}to{transform:none;opacity:1}}
.panel h1{
  font-size:clamp(28px,8vw,42px);
  font-weight:800;
  letter-spacing:.12em;
  line-height:1.15;
  background:linear-gradient(180deg,#fff3dd 20%,var(--amber) 65%,var(--amber-deep));
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 4px 18px rgba(255,180,84,.28));
}
.panel .tag{
  font-size:11px;letter-spacing:.5em;color:var(--dim);
  margin:6px 0 20px;font-weight:700;
}
.panel h2{
  font-size:clamp(24px,7vw,34px);
  letter-spacing:.14em;font-weight:800;margin-bottom:4px;
}
.panel h2.win{color:var(--moss);text-shadow:0 0 22px rgba(159,206,90,.5)}
.panel h2.lose{color:var(--danger);text-shadow:0 0 22px rgba(255,106,94,.45)}
.result-time{
  font-family:ui-monospace,Menlo,Consolas,monospace;
  font-variant-numeric:tabular-nums;
  font-size:clamp(30px,9vw,44px);font-weight:700;color:var(--ink);
  margin:8px 0 2px;
}
.newbest{
  display:inline-block;
  font-size:12px;font-weight:800;letter-spacing:.24em;
  color:#1c1406;background:linear-gradient(180deg,#ffd489,var(--amber));
  border-radius:999px;padding:5px 16px;margin:6px 0 4px;
  animation:pulse 1.1s ease infinite;
}
@keyframes pulse{50%{transform:scale(1.07);box-shadow:0 0 18px rgba(255,180,84,.6)}}
.sub-note{font-size:12px;color:var(--dim);margin:6px 0 18px;letter-spacing:.08em}
.diffs{display:flex;flex-direction:column;gap:10px;margin:4px 0 18px}
.diffs button{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(48,58,38,.9),rgba(31,38,24,.9));
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 16px;
  color:var(--ink);
  cursor:pointer;
  touch-action:manipulation;
  font-family:inherit;
  transition:transform .14s ease, border-color .2s, box-shadow .2s;
}
.diffs button:hover{border-color:rgba(255,180,84,.55);box-shadow:0 0 20px rgba(255,180,84,.14)}
.diffs button:active{transform:scale(.97)}
.diffs .name{font-weight:800;font-size:16px;letter-spacing:.14em;text-align:left}
.diffs .meta{display:block;font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.06em;margin-top:3px}
.diffs .best{
  font-family:ui-monospace,Menlo,Consolas,monospace;
  font-variant-numeric:tabular-nums;
  font-size:13px;color:var(--moss);font-weight:700;
}
.diffs .best small{display:block;font-size:9px;letter-spacing:.28em;color:var(--dim)}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn{
  font-family:inherit;
  font-weight:800;letter-spacing:.18em;font-size:14px;
  border-radius:999px;padding:12px 28px;cursor:pointer;
  touch-action:manipulation;
  transition:transform .14s ease, box-shadow .2s;
  border:1px solid transparent;
}
.btn:active{transform:scale(.95)}
.btn.primary{
  color:#1c1406;
  background:linear-gradient(180deg,#ffd489,var(--amber) 60%,var(--amber-deep));
  box-shadow:0 8px 24px rgba(255,180,84,.3);
}
.btn.primary:hover{box-shadow:0 8px 30px rgba(255,180,84,.5)}
.btn.ghost{
  color:var(--ink);background:transparent;border-color:var(--line);
}
.btn.ghost:hover{border-color:rgba(232,237,219,.4)}
.help{
  width:100%;
  margin-top:12px;
  font-size:11px;line-height:1.9;color:var(--dim);
  text-align:center;letter-spacing:.05em;
}
kbd{
  font-family:ui-monospace,Menlo,Consolas,monospace;
  background:rgba(196,214,150,.1);
  border:1px solid var(--line);
  border-radius:5px;padding:1px 6px;font-size:10px;
}
.help .pc-only{display:none}
@media (hover:hover) and (pointer:fine){
  .help .pc-only{display:inline}
  .help .touch-only{display:none}
}
footer{
  margin-top:auto;
  padding:14px 0 max(10px, env(safe-area-inset-bottom));
  font-size:10px;color:var(--dim);letter-spacing:.22em;
}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="logo"><span class="mark">◆</span> マインフィールド<span class="sub">MINE FIELD — 夜間掃海</span></div>
    <div class="diff-badge" id="diffBadge">—</div>
  </header>

  <div class="hud">
    <div class="box">
      <div class="label">残り地雷</div>
      <div class="value" id="mineCount">000</div>
    </div>
    <div class="box">
      <div class="label">タイム</div>
      <div class="value ok" id="timeDisp">00:00</div>
    </div>
    <button id="flagModeBtn" title="旗モード切替" aria-label="旗モード切替">🚩</button>
    <button id="soundBtn" title="サウンド切替" aria-label="サウンド切替">🔊</button>
    <button id="homeBtn" title="タイトルへ" aria-label="タイトルへ">☰</button>
  </div>

  <div id="stage">
    <canvas id="board" width="360" height="360"></canvas>
    <div id="overlay"><div class="panel" id="panelBody"></div></div>
  </div>

  <div class="help">
    <span class="touch-only">タップ:開く / 長押し or 🚩モード:旗を立てる / 数字タップ:まとめ開き</span>
    <span class="pc-only">クリック:開く <kbd>右クリック</kbd> or <kbd>F</kbd>:旗 / <kbd>←↑↓→</kbd>移動 <kbd>Enter</kbd>開く / 数字クリックでまとめ開き</span>
  </div>

  <footer>© 2026 masafykun</footer>
</div>

<script>
'use strict';
(function(){

/* ================= 基本設定 ================= */
const DIFFS = {
  easy:   {label:'初級', cols:9,  rows:9,  mines:10},
  normal: {label:'中級', cols:16, rows:16, mines:40},
  hard:   {label:'上級', cols:30, rows:16, mines:99}
};
const LS_BEST = 'minefield.best.v1';
const LS_MUTE = 'minefield.mute.v1';

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
const overlay = document.getElementById('overlay');
const panelBody = document.getElementById('panelBody');
const mineCountEl = document.getElementById('mineCount');
const timeDispEl = document.getElementById('timeDisp');
const diffBadgeEl = document.getElementById('diffBadge');
const flagModeBtn = document.getElementById('flagModeBtn');
const soundBtn = document.getElementById('soundBtn');
const homeBtn = document.getElementById('homeBtn');

const NUM_COLORS = ['', '#6db3ff', '#7ee787', '#ff8f7a', '#c9a6ff', '#ffd166', '#5fe0d8', '#f2ead6', '#ff6b9d'];

let diffKey = 'easy';
let scene = 'title';           // title | play | clear | over
let G = null;                  // ゲーム状態
let cell = 32;                 // セル1辺(CSS px)
let dpr = 1;
let flagMode = false;
let muted = false;
let cursor = {x:0, y:0, on:false};
let hover = {x:-1, y:-1};
let particles = [];
let lastTimeStr = '';

try { muted = localStorage.getItem(LS_MUTE) === '1'; } catch(e){}

function loadBest(){
  try {
    const raw = localStorage.getItem(LS_BEST);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return {};
}
function saveBest(b){
  try { localStorage.setItem(LS_BEST, JSON.stringify(b)); } catch(e){}
}
let best = loadBest();

/* ================= サウンド(WebAudio合成) ================= */
let AC = null;
function audio(){
  if (muted) return null;
  if (!AC) {
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return null;
    AC = new Ctor();
  }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, vol, when, slide){
  const ac = audio();
  if (!ac) return;
  const t0 = ac.currentTime + (when || 0);
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol || 0.15, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g).connect(ac.destination);
  o.start(t0);
  o.stop(t0 + dur + 0.05);
}
function sndReveal(n){ tone(n > 4 ? 520 : 660 + n * 30, 0.09, 'triangle', 0.12); }
function sndFlag(on){ tone(on ? 920 : 620, 0.06, 'square', 0.08); }
function sndBoom(){
  const ac = audio();
  if (!ac) return;
  const t0 = ac.currentTime;
  const len = Math.floor(ac.sampleRate * 0.5);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.5, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(900, t0);
  lp.frequency.exponentialRampToValueAtTime(120, t0 + 0.45);
  src.connect(lp).connect(g).connect(ac.destination);
  src.start(t0);
  tone(140, 0.5, 'sine', 0.35, 0, 42);
}
function sndWin(){
  [523, 659, 784, 1047].forEach(function(f, i){
    tone(f, 0.22, 'triangle', 0.16, i * 0.11);
  });
  tone(1319, 0.4, 'sine', 0.1, 0.44);
}

/* ================= 盤面ロジック ================= */
function newGame(){
  const d = DIFFS[diffKey];
  let cols = d.cols, rows = d.rows;
  // 縦画面では上級・中級横長盤を縦向きに回す
  if (cols > rows && window.innerHeight > window.innerWidth) {
    const t = cols; cols = rows; rows = t;
  }
  const n = cols * rows;
  G = {
    cols: cols, rows: rows, mines: d.mines,
    mine: new Uint8Array(n),
    num: new Uint8Array(n),
    open: new Uint8Array(n),
    flag: new Uint8Array(n),
    rt: new Float64Array(n),     // 開封アニメ開始時刻
    placed: false,
    opened: 0,
    flags: 0,
    startAt: 0,
    endAt: 0,
    bustIdx: -1
  };
  particles = [];
  cursor.x = Math.floor(cols / 2);
  cursor.y = Math.floor(rows / 2);
  scene = 'play';
  hideOverlay();
  updateHud();
  resize();
}
function idx(x, y){ return y * G.cols + x; }
function inb(x, y){ return x >= 0 && y >= 0 && x < G.cols && y < G.rows; }
function eachNb(x, y, fn){
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++){
      if (!dx && !dy) continue;
      const nx = x + dx, ny = y + dy;
      if (inb(nx, ny)) fn(nx, ny);
    }
}
function placeMines(sx, sy){
  const n = G.cols * G.rows;
  const banned = new Set([idx(sx, sy)]);
  eachNb(sx, sy, function(x, y){ banned.add(idx(x, y)); });
  // 高密度盤で除外しきれない場合は初手セルのみ除外
  const pool = [];
  for (let i = 0; i < n; i++) if (!banned.has(i)) pool.push(i);
  if (pool.length < G.mines) {
    pool.length = 0;
    for (let i = 0; i < n; i++) if (i !== idx(sx, sy)) pool.push(i);
  }
  for (let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    const t = pool[i]; pool[i] = pool[j]; pool[j] = t;
  }
  for (let k = 0; k < G.mines; k++) G.mine[pool[k]] = 1;
  for (let y = 0; y < G.rows; y++)
    for (let x = 0; x < G.cols; x++){
      if (G.mine[idx(x, y)]) continue;
      let c = 0;
      eachNb(x, y, function(nx, ny){ if (G.mine[idx(nx, ny)]) c++; });
      G.num[idx(x, y)] = c;
    }
  G.placed = true;
  G.startAt = performance.now();
}
function reveal(x, y){
  if (scene !== 'play') return;
  const i = idx(x, y);
  if (G.flag[i]) return;
  if (G.open[i]) { chord(x, y); return; }
  if (!G.placed) placeMines(x, y);
  if (G.mine[i]) { bust(i); return; }
  // 洪水展開(スタック式)+ 開封順で波紋アニメ
  const now = performance.now();
  const stack = [[x, y]];
  let order = 0;
  while (stack.length){
    const p = stack.pop();
    const cx = p[0], cy = p[1];
    const ci = idx(cx, cy);
    if (G.open[ci] || G.flag[ci] || G.mine[ci]) continue;
    G.open[ci] = 1;
    G.opened++;
    G.rt[ci] = now + Math.min(order, 60) * 14;
    order++;
    if (G.num[ci] === 0) eachNb(cx, cy, function(nx, ny){
      if (!G.open[idx(nx, ny)]) stack.push([nx, ny]);
    });
  }
  sndReveal(Math.min(order, 8));
  checkWin();
}
function chord(x, y){
  const i = idx(x, y);
  const n = G.num[i];
  if (!n) return;
  let f = 0;
  eachNb(x, y, function(nx, ny){ if (G.flag[idx(nx, ny)]) f++; });
  if (f !== n) return;
  const targets = [];
  eachNb(x, y, function(nx, ny){
    const ni = idx(nx, ny);
    if (!G.open[ni] && !G.flag[ni]) targets.push([nx, ny]);
  });
  for (let k = 0; k < targets.length; k++){
    if (scene !== 'play') break;
    reveal(targets[k][0], targets[k][1]);
  }
}
function toggleFlag(x, y){
  if (scene !== 'play') return;
  const i = idx(x, y);
  if (G.open[i]) return;
  if (!G.placed) {
    // 開始前でも旗は立てられる(タイマーは初手開封で始動)
  }
  G.flag[i] = G.flag[i] ? 0 : 1;
  G.flags += G.flag[i] ? 1 : -1;
  sndFlag(!!G.flag[i]);
  if (navigator.vibrate) navigator.vibrate(18);
  updateHud();
}
function bust(i){
  G.bustIdx = i;
  G.endAt = performance.now();
  scene = 'over';
  const now = performance.now();
  let order = 0;
  for (let k = 0; k < G.mine.length; k++){
    if (G.mine[k] && !G.flag[k]) {
      G.open[k] = 1;
      G.rt[k] = now + order * 26;
      order++;
    }
  }
  sndBoom();
  if (navigator.vibrate) navigator.vibrate([60, 40, 90]);
  stage.classList.remove('shake');
  void stage.offsetWidth;
  stage.classList.add('shake');
  spawnBlast(i);
  setTimeout(function(){ if (scene === 'over') showResult(false); }, 1050);
}
function checkWin(){
  const total = G.cols * G.rows;
  if (G.opened < total - G.mines) return;
  G.endAt = performance.now();
  scene = 'clear';
  for (let k = 0; k < total; k++){
    if (G.mine[k] && !G.flag[k]) { G.flag[k] = 1; G.flags++; }
  }
  updateHud();
  sndWin();
  spawnConfetti();
  const sec = elapsedSec();
  let isNew = false;
  const prev = best[diffKey];
  if (prev == null || sec < prev) {
    best[diffKey] = sec;
    saveBest(best);
    isNew = true;
  }
  setTimeout(function(){ if (scene === 'clear') showResult(true, sec, isNew); }, 900);
}
function elapsedSec(){
  if (!G || !G.startAt) return 0;
  const end = G.endAt || performance.now();
  return Math.max(0, (end - G.startAt) / 1000);
}
function fmtTime(sec){
  const s = Math.floor(sec);
  const m = Math.floor(s / 60);
  return String(m).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}
function fmtBest(sec){
  if (sec == null) return '——';
  return fmtTime(sec) + '.' + String(Math.floor((sec % 1) * 10));
}
function calcScore(win, sec){
  // 勝利: 地雷数×100 からタイム減点 / 敗北: 開けたマス数×5
  if (win) return Math.max(100, Math.round(G.mines * 100 - sec * 10));
  return G.opened * 5;
}

/* ================= パーティクル ================= */
function spawnBlast(i){
  const x = (i % G.cols + 0.5) * cell;
  const y = (Math.floor(i / G.cols) + 0.5) * cell;
  for (let k = 0; k < 46; k++){
    const a = Math.random() * Math.PI * 2;
    const sp = (Math.random() * 0.5 + 0.15) * cell;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - cell * 0.12,
      life: 1, decay: 0.014 + Math.random() * 0.02,
      size: cell * (0.06 + Math.random() * 0.1),
      color: ['#ff6a5e', '#ffb454', '#ffe3a3', '#8a8f7a'][Math.floor(Math.random() * 4)],
      grav: cell * 0.012
    });
  }
}
function spawnConfetti(){
  const W = G.cols * cell;
  for (let k = 0; k < 110; k++){
    particles.push({
      x: Math.random() * W, y: -Math.random() * cell * 4,
      vx: (Math.random() - 0.5) * cell * 0.1,
      vy: (Math.random() * 0.1 + 0.06) * cell,
      life: 1, decay: 0.004 + Math.random() * 0.004,
      size: cell * (0.08 + Math.random() * 0.1),
      color: ['#9fce5a', '#ffb454', '#6db3ff', '#ff6b9d', '#ffe3a3'][Math.floor(Math.random() * 5)],
      grav: cell * 0.002,
      spin: Math.random() * Math.PI * 2,
      spinV: (Math.random() - 0.5) * 0.3
    });
  }
}

/* ================= 描画 ================= */
function resize(){
  if (!G) return;
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  const availW = Math.min(window.innerWidth * 0.96, 860);
  const availH = window.innerHeight - 230;
  cell = Math.floor(Math.min(availW / G.cols, Math.max(availH, 200) / G.rows));
  cell = Math.max(15, Math.min(cell, 46));
  const W = G.cols * cell, H = G.rows * cell;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
}
function rrect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawFlagIcon(px, py, c, alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#c8cfae';
  ctx.lineWidth = Math.max(1.5, c * 0.06);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(px + c * 0.36, py + c * 0.2);
  ctx.lineTo(px + c * 0.36, py + c * 0.8);
  ctx.stroke();
  ctx.fillStyle = '#ff6a5e';
  ctx.beginPath();
  ctx.moveTo(px + c * 0.36, py + c * 0.2);
  ctx.lineTo(px + c * 0.78, py + c * 0.34);
  ctx.lineTo(px + c * 0.36, py + c * 0.48);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawMineIcon(px, py, c, boomed){
  const cx = px + c / 2, cy = py + c / 2;
  const r = c * 0.2;
  ctx.save();
  if (boomed) {
    ctx.shadowColor = 'rgba(255,106,94,.9)';
    ctx.shadowBlur = c * 0.5;
  }
  ctx.strokeStyle = boomed ? '#ffb3ab' : '#3a4032';
  ctx.lineWidth = Math.max(1.5, c * 0.07);
  ctx.lineCap = 'round';
  for (let k = 0; k < 8; k++){
    const a = k * Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r * 0.8, cy + Math.sin(a) * r * 0.8);
    ctx.lineTo(cx + Math.cos(a) * r * 1.65, cy + Math.sin(a) * r * 1.65);
    ctx.stroke();
  }
  ctx.fillStyle = boomed ? '#ff6a5e' : '#22271c';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = boomed ? '#fff' : 'rgba(220,230,200,.5)';
  ctx.beginPath();
  ctx.arc(cx - r * 0.35, cy - r * 0.35, r * 0.28, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}
function draw(now){
  if (!G) return;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = G.cols * cell, H = G.rows * cell;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#12160e';
  ctx.fillRect(0, 0, W, H);
  const gap = Math.max(1, cell * 0.045);
  const rad = Math.max(2, cell * 0.14);
  const font = 'bold ' + Math.round(cell * 0.52) + 'px ui-monospace,Menlo,Consolas,monospace';

  for (let y = 0; y < G.rows; y++){
    for (let x = 0; x < G.cols; x++){
      const i = idx(x, y);
      const px = x * cell, py = y * cell;
      const opened = !!G.open[i];
      // 開封アニメ進行度
      let p = 1;
      if (opened) {
        p = (now - G.rt[i]) / 200;
        if (p < 0) p = 0;
        if (p > 1) p = 1;
      }
      if (!opened || p < 1) {
        // 閉じタイル(市松の2トーン+ハイライト)
        const even = (x + y) % 2 === 0;
        const gTile = ctx.createLinearGradient(px, py, px, py + cell);
        gTile.addColorStop(0, even ? '#333d29' : '#2d3624');
        gTile.addColorStop(1, even ? '#262e1d' : '#222919');
        ctx.fillStyle = gTile;
        rrect(px + gap, py + gap, cell - gap * 2, cell - gap * 2, rad);
        ctx.fill();
        ctx.fillStyle = 'rgba(230,240,205,.07)';
        rrect(px + gap, py + gap, cell - gap * 2, (cell - gap * 2) * 0.34, rad);
        ctx.fill();
        if (hover.x === x && hover.y === y && scene === 'play' && !opened) {
          ctx.fillStyle = 'rgba(255,180,84,.13)';
          rrect(px + gap, py + gap, cell - gap * 2, cell - gap * 2, rad);
          ctx.fill();
        }
        if (G.flag[i]) drawFlagIcon(px, py, cell, 1);
        if (scene === 'over' && G.flag[i] && !G.mine[i]) {
          // 誤旗に✕
          ctx.strokeStyle = 'rgba(255,90,80,.95)';
          ctx.lineWidth = Math.max(2, cell * 0.08);
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(px + cell * 0.24, py + cell * 0.24);
          ctx.lineTo(px + cell * 0.76, py + cell * 0.76);
          ctx.moveTo(px + cell * 0.76, py + cell * 0.24);
          ctx.lineTo(px + cell * 0.24, py + cell * 0.76);
          ctx.stroke();
        }
      }
      if (opened && p > 0) {
        // 開封済み(スケールインで着地)
        const s = 0.62 + 0.38 * p;
        const inset = gap + (cell - gap * 2) * (1 - s) / 2;
        ctx.globalAlpha = p;
        ctx.fillStyle = G.mine[i]
          ? (i === G.bustIdx ? 'rgba(90,20,16,.96)' : 'rgba(30,24,18,.94)')
          : 'rgba(14,18,10,.94)';
        rrect(px + inset, py + inset, cell - inset * 2, cell - inset * 2, rad * 0.7);
        ctx.fill();
        if (p === 1) {
          ctx.strokeStyle = 'rgba(196,214,150,.07)';
          ctx.lineWidth = 1;
          rrect(px + gap, py + gap, cell - gap * 2, cell - gap * 2, rad * 0.7);
          ctx.stroke();
        }
        if (G.mine[i]) {
          drawMineIcon(px, py, cell, i === G.bustIdx);
        } else if (G.num[i] > 0) {
          ctx.font = font;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = NUM_COLORS[G.num[i]];
          ctx.fillText(String(G.num[i]), px + cell / 2, py + cell / 2 + cell * 0.03);
        }
        ctx.globalAlpha = 1;
      }
    }
  }

  // キーボードカーソル
  if (cursor.on && scene === 'play') {
    const glow = 0.55 + 0.45 * Math.sin(now / 240);
    ctx.strokeStyle = 'rgba(255,180,84,' + (0.5 + glow * 0.5).toFixed(3) + ')';
    ctx.lineWidth = Math.max(2, cell * 0.09);
    ctx.shadowColor = 'rgba(255,180,84,.7)';
    ctx.shadowBlur = cell * 0.35 * glow;
    rrect(cursor.x * cell + gap * 0.6, cursor.y * cell + gap * 0.6,
          cell - gap * 1.2, cell - gap * 1.2, rad);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // パーティクル
  for (let k = particles.length - 1; k >= 0; k--){
    const pt = particles[k];
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vy += pt.grav;
    pt.vx *= 0.985;
    pt.life -= pt.decay;
    if (pt.spin != null) pt.spin += pt.spinV;
    if (pt.life <= 0 || pt.y > H + cell * 2) { particles.splice(k, 1); continue; }
    ctx.globalAlpha = Math.min(1, pt.life * 1.6);
    ctx.fillStyle = pt.color;
    if (pt.spin != null) {
      ctx.save();
      ctx.translate(pt.x, pt.y);
      ctx.rotate(pt.spin);
      ctx.fillRect(-pt.size / 2, -pt.size / 3, pt.size, pt.size * 0.66);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size * pt.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

/* ================= HUD・画面遷移 ================= */
function updateHud(){
  if (G) {
    mineCountEl.textContent = String(Math.max(0, G.mines - G.flags)).padStart(3, '0');
  } else {
    mineCountEl.textContent = '000';
  }
  diffBadgeEl.textContent = DIFFS[diffKey].label + ' ' + DIFFS[diffKey].mines + '雷';
  flagModeBtn.classList.toggle('on', flagMode);
  soundBtn.textContent = muted ? '🔇' : '🔊';
}
function tickTimer(){
  let str = '00:00';
  if (G && G.startAt) str = fmtTime(elapsedSec());
  if (str !== lastTimeStr) {
    lastTimeStr = str;
    timeDispEl.textContent = str;
  }
}
function hideOverlay(){ overlay.classList.remove('show'); }
function showOverlay(html){
  panelBody.innerHTML = html;
  overlay.classList.add('show');
}
function diffButtonsHtml(){
  const keys = ['easy', 'normal', 'hard'];
  return '<div class="diffs">' + keys.map(function(k){
    const d = DIFFS[k];
    return '<button data-diff="' + k + '">' +
      '<span><span class="name">' + d.label + '</span>' +
      '<span class="meta">' + d.cols + '×' + d.rows + ' / 地雷 ' + d.mines + '</span></span>' +
      '<span class="best"><small>BEST</small>' + fmtBest(best[k]) + '</span>' +
      '</button>';
  }).join('') + '</div>';
}
function showTitle(){
  scene = 'title';
  G = null;
  particles = [];
  lastTimeStr = '';
  timeDispEl.textContent = '00:00';
  updateHud();
  showOverlay(
    '<h1>マインフィールド</h1>' +
    '<div class="tag">MINE FIELD</div>' +
    '<div class="sub-note">初手は必ず安全。数字を読み、旗を立て、全マスを掃海せよ。</div>' +
    diffButtonsHtml() +
    '<div class="sub-note">難易度を選ぶとすぐ出撃します(キー <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> でも選択可)</div>'
  );
  bindDiffButtons();
}
function showResult(win, sec, isNew){
  const time = win ? sec : elapsedSec();
  showOverlay(
    '<h2 class="' + (win ? 'win' : 'lose') + '">' + (win ? '掃海完了!' : '触雷……') + '</h2>' +
    '<div class="result-time">' + fmtTime(time) + '<span style="font-size:.5em">.' + String(Math.floor((time % 1) * 10)) + '</span></div>' +
    '<div class="sub-note" style="margin:2px 0 0">スコア <b style="color:var(--amber);font-size:1.3em;font-family:ui-monospace,Menlo,monospace">' + calcScore(win, time) + '</b></div>' +
    (win && isNew ? '<div class="newbest">★ 新記録 ★</div>' : '') +
    '<div class="sub-note">' + DIFFS[diffKey].label + ' のベスト:' + fmtBest(best[diffKey]) +
    (win ? '' : ' / 開けたマス ' + G.opened + ' / ' + (G.cols * G.rows - G.mines)) + '</div>' +
    '<div class="actions">' +
    '<button class="btn primary" id="retryBtn">もう一度</button>' +
    '<button class="btn ghost" id="titleBtn">タイトルへ</button>' +
    '</div>' +
    '<div class="sub-note" style="margin-top:14px"><kbd>Enter</kbd> でリスタート</div>'
  );
  const rb = document.getElementById('retryBtn');
  const tb = document.getElementById('titleBtn');
  if (rb) rb.addEventListener('click', function(){ audio(); newGame(); });
  if (tb) tb.addEventListener('click', showTitle);
}
function bindDiffButtons(){
  panelBody.querySelectorAll('[data-diff]').forEach(function(btn){
    btn.addEventListener('click', function(){
      diffKey = btn.getAttribute('data-diff');
      audio();
      newGame();
    });
  });
}

/* ================= 入力(ポインタ) ================= */
function cellFromEvent(e){
  const r = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / cell);
  const y = Math.floor((e.clientY - r.top) / cell);
  if (!G || !inb(x, y)) return null;
  return {x: x, y: y};
}
let lpTimer = 0, lpFired = false, downCell = null;
canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });
canvas.addEventListener('pointerdown', function(e){
  audio();
  if (scene !== 'play') return;
  const c = cellFromEvent(e);
  if (!c) return;
  cursor.on = false;
  downCell = c;
  lpFired = false;
  if (e.pointerType === 'mouse') {
    if (e.button === 2) { toggleFlag(c.x, c.y); lpFired = true; }
    return;
  }
  // タッチ/ペン:長押しで旗
  clearTimeout(lpTimer);
  lpTimer = setTimeout(function(){
    lpFired = true;
    toggleFlag(c.x, c.y);
  }, 380);
});
canvas.addEventListener('pointermove', function(e){
  if (e.pointerType === 'mouse') {
    const c = cellFromEvent(e);
    hover.x = c ? c.x : -1;
    hover.y = c ? c.y : -1;
  } else if (downCell) {
    const c = cellFromEvent(e);
    if (!c || c.x !== downCell.x || c.y !== downCell.y) {
      clearTimeout(lpTimer);
      downCell = null;
    }
  }
});
canvas.addEventListener('pointerleave', function(){
  hover.x = hover.y = -1;
  clearTimeout(lpTimer);
});
canvas.addEventListener('pointerup', function(e){
  clearTimeout(lpTimer);
  if (scene !== 'play') { downCell = null; return; }
  if (lpFired) { downCell = null; return; }
  const c = cellFromEvent(e);
  if (!c || !downCell || c.x !== downCell.x || c.y !== downCell.y) { downCell = null; return; }
  downCell = null;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  if (flagMode && !G.open[idx(c.x, c.y)]) toggleFlag(c.x, c.y);
  else reveal(c.x, c.y);
});
canvas.addEventListener('pointercancel', function(){
  clearTimeout(lpTimer);
  downCell = null;
});

/* ================= 入力(キーボード) ================= */
document.addEventListener('keydown', function(e){
  const k = e.key;
  if (scene === 'title') {
    if (k === '1') { diffKey = 'easy'; audio(); newGame(); }
    else if (k === '2') { diffKey = 'normal'; audio(); newGame(); }
    else if (k === '3') { diffKey = 'hard'; audio(); newGame(); }
    else if (k === 'Enter') { audio(); newGame(); }
    return;
  }
  if (scene === 'clear' || scene === 'over') {
    if (overlay.classList.contains('show')) {
      if (k === 'Enter') { audio(); newGame(); }
      else if (k === 'Escape') showTitle();
    }
    return;
  }
  if (scene !== 'play') return;
  let dx = 0, dy = 0;
  if (k === 'ArrowLeft' || k === 'a') dx = -1;
  else if (k === 'ArrowRight' || k === 'd') dx = 1;
  else if (k === 'ArrowUp' || k === 'w') dy = -1;
  else if (k === 'ArrowDown' || k === 's') dy = 1;
  if (dx || dy) {
    e.preventDefault();
    cursor.on = true;
    cursor.x = Math.min(G.cols - 1, Math.max(0, cursor.x + dx));
    cursor.y = Math.min(G.rows - 1, Math.max(0, cursor.y + dy));
    return;
  }
  if (k === 'Enter' || k === ' ' || k === 'z' || k === 'Z') {
    e.preventDefault();
    cursor.on = true;
    audio();
    reveal(cursor.x, cursor.y);
  } else if (k === 'f' || k === 'F' || k === 'x' || k === 'X') {
    e.preventDefault();
    cursor.on = true;
    toggleFlag(cursor.x, cursor.y);
  } else if (k === 'Escape') {
    showTitle();
  } else if (k === 'r' || k === 'R') {
    audio();
    newGame();
  }
});

/* ================= HUDボタン ================= */
flagModeBtn.addEventListener('click', function(){
  flagMode = !flagMode;
  updateHud();
  sndFlag(flagMode);
});
soundBtn.addEventListener('click', function(){
  muted = !muted;
  try { localStorage.setItem(LS_MUTE, muted ? '1' : '0'); } catch(e){}
  if (!muted) sndFlag(true);
  updateHud();
});
homeBtn.addEventListener('click', showTitle);

/* ================= メインループ・起動 ================= */
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function(){ setTimeout(resize, 120); });
function loop(now){
  if (scene !== 'title') {
    tickTimer();
    draw(now);
  }
  requestAnimationFrame(loop);
}
// タイトル用の初期キャンバスサイズ(装飾盤面を軽く描く)
(function initTitleBoard(){
  const w = Math.max(280, Math.floor(Math.min(window.innerWidth * 0.96, 440)));
  const h = Math.max(340, Math.floor(Math.min(window.innerHeight - 230, 520)));
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const c = w / 9;
  for (let y = 0; y * c < h; y++)
    for (let x = 0; x < 9; x++){
      const even = (x + y) % 2 === 0;
      ctx.fillStyle = even ? '#2b3324' : '#242b1e';
      ctx.fillRect(x * c + 1, y * c + 1, c - 2, c - 2);
    }
})();
updateHud();
showTitle();
requestAnimationFrame(loop);

})();
</script>
